<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glimpse — Glimpsing Scan Animation</title>
<link rel="stylesheet" href="tokens.css">
<style>

body {
  background: var(--surface-base);
  padding: var(--space-10);
  display: flex;
  flex-direction: column;
  gap: var(--space-10);
  align-items: center;
}

.page-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-secondary); max-width: 600px; width: 100%; }
.section-label { font-family: var(--font-display); font-size: var(--text-xs); font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; width: 100%; }
.option-desc { font-family: var(--font-display); font-size: var(--text-xs); color: var(--text-dim); text-align: center; max-width: 420px; line-height: 1.6; }

.play-btn {
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 500;
  background: var(--brand-dim);
  border: 1px solid var(--brand-border);
  color: var(--text-primary);
  cursor: pointer;
  transition: background 0.15s;
}
.play-btn:hover { background: var(--brand-muted); }

/* ═══ Glimpsing scan ═══ */

.scan-demo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
}

.scan-stage {
  position: relative;
  width: 100px;
  height: 67px;
}

/* Ghost eye — always visible, faint */
.scan-ghost {
  position: absolute;
  top: 0; left: 0;
  width: 100px;
  height: 67px;
  opacity: 0.18;
}

/* Revealed eye — clipped to frame position */
.scan-reveal {
  position: absolute;
  top: 0; left: 0;
  width: 100px;
  height: 67px;
  clip-path: inset(0 100% 100% 0);
  z-index: 2;
}

/* Selection frame */
.scan-frame {
  position: absolute;
  width: 52px;
  height: 52px;
  border: 1.5px solid rgba(108, 99, 255, 0.45);
  border-radius: 3px;
  z-index: 3;
  opacity: 0;
}

/* Label */
.scan-label {
  font-family: var(--font-display);
  font-size: var(--text-base);
  color: var(--text-secondary);
  opacity: 0.6;
}

/* ═══ Animation: ambient drift scan ═══

  Frame drifts continuously across the eye like a wandering gaze.
  No hard stops — constant slow motion with varying speed
  (slower when lingering, faster between positions).

  Eye: 100x67. Frame: ~52x52 (breathes between 44-56px).
  Ghost: 12% opacity. Reveal: 45% opacity (ambient, not full intensity).
  Frame border: 1px, 0.25 alpha (subtle).
  Cycle: 8s, loops infinitely.

  Speed varies via uneven keyframe spacing:
  0→10% fast sweep, 10→28% slow linger, 28→35% quick jump,
  35→52% slow scan, 52→60% medium, 60→72% fast sweep,
  72→90% slow return, 90→100% settle.

  Clip-path has 2% inset buffer to prevent reveal peeking
  outside frame during interpolation.

═══ */

.scanning .scan-frame {
  animation: frameDrift 8s ease-in-out infinite;
  opacity: 1;
}

/* Position + size in one animation — guarantees perfect sync with clip-path.
   Speed varies via keyframe spacing:
   0→10% fast sweep, 10→28% slow linger, 28→35% quick jump,
   35→52% slow scan, 52→60% medium, 60→72% fast sweep,
   72→90% slow return, 90→100% settle */
@keyframes frameDrift {
  0%   { top: -4px;  left: -6px; width: 52px; height: 52px; }
  10%  { top: 2px;   left: 34px; width: 56px; height: 56px; }
  28%  { top: 12px;  left: 50px; width: 44px; height: 44px; }
  35%  { top: -3px;  left: 44px; width: 56px; height: 56px; }
  52%  { top: 16px;  left: 10px; width: 48px; height: 48px; }
  60%  { top: 6px;   left: -6px; width: 48px; height: 48px; }
  72%  { top: 17px;  left: 42px; width: 54px; height: 54px; }
  90%  { top: -2px;  left: 8px;  width: 46px; height: 46px; }
  100% { top: -4px;  left: -6px; width: 52px; height: 52px; }
}

/* Reveal clip-path drifts with frame. Frame 52x52 on 100x67.
   inset(top/67, (100-left-52)/100, (67-top-52)/67, left/100) */

.scanning .scan-reveal {
  animation: revealDrift 8s ease-in-out infinite;
}

/* Clip-path inset 2% smaller than frame on each edge.
   This ensures purple never peeks outside the frame border
   even when pixel vs percentage interpolation slightly diverges. */
@keyframes revealDrift {
  0%   { clip-path: inset(2%    56%   30.4% 2%);  }
  10%  { clip-path: inset(5%    12%   15.4% 36%); }
  28%  { clip-path: inset(19.9% 8%    18.4% 52%); }
  35%  { clip-path: inset(2%    2%    22.9% 46%); }
  52%  { clip-path: inset(25.9% 44%   6.5%  12%); }
  60%  { clip-path: inset(11%   60%   21.4% 2%);  }
  72%  { clip-path: inset(27.4% 6%    2%    44%); }
  90%  { clip-path: inset(2%    48%   30.4% 10%); }
  100% { clip-path: inset(2%    56%   30.4% 2%);  }
}

/* ═══ Smaller inline version (for chat thinking state) ═══ */

.inline-demo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-5);
  background: var(--surface-base);
  border: 1px solid rgba(108, 99, 255, 0.08);
  border-radius: var(--radius-md);
}

.scan-stage-sm {
  position: relative;
  width: 40px;
  height: 27px;
  flex-shrink: 0;
}

.scan-ghost-sm {
  position: absolute;
  top: 0; left: 0;
  width: 40px;
  height: 27px;
  opacity: 0.18;
}

.scan-reveal-sm {
  position: absolute;
  top: 0; left: 0;
  width: 40px;
  height: 27px;
  z-index: 2;
  clip-path: inset(0 100% 100% 0);
}

.scan-frame-sm {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 1px solid rgba(108, 99, 255, 0.4);
  border-radius: 2px;
  z-index: 3;
  opacity: 0;
}

/* Small: 20x20 frame on 40x27 eye — same drift pattern as large, scaled down */
.scanning .scan-frame-sm {
  animation: frameDriftSm 8s ease-in-out infinite;
  opacity: 1;
}

@keyframes frameDriftSm {
  0%   { top: -2px; left: -2px; width: 20px; height: 20px; }
  10%  { top: 1px;  left: 14px; width: 22px; height: 22px; }
  28%  { top: 5px;  left: 20px; width: 17px; height: 17px; }
  35%  { top: -1px; left: 18px; width: 22px; height: 22px; }
  52%  { top: 7px;  left: 4px;  width: 19px; height: 19px; }
  60%  { top: 2px;  left: -2px; width: 19px; height: 19px; }
  72%  { top: 7px;  left: 17px; width: 21px; height: 21px; }
  90%  { top: -1px; left: 3px;  width: 18px; height: 18px; }
  100% { top: -2px; left: -2px; width: 20px; height: 20px; }
}

.scanning .scan-reveal-sm {
  animation: revealDriftSm 8s ease-in-out infinite;
}

/* Synced clip-path, 2% inset buffer.
   Formula: inset(max(0,top)/27+2%, max(0,40-left-W)/40+2%, max(0,27-top-W)/27+2%, max(0,left)/40+2%) */
@keyframes revealDriftSm {
  0%   { clip-path: inset(2%    54%   35.3% 2%);  }
  10%  { clip-path: inset(5.7%  12%   24.2% 37%); }
  28%  { clip-path: inset(20.5% 9.5%  20.5% 52%); }
  35%  { clip-path: inset(2%    2%    24.2% 47%); }
  52%  { clip-path: inset(27.9% 44.5% 5.7%  12%); }
  60%  { clip-path: inset(9.4%  59.5% 22.2% 2%);  }
  72%  { clip-path: inset(27.9% 7%    2%    44.5%); }
  90%  { clip-path: inset(2%    49.5% 32.8% 9.5%); }
  100% { clip-path: inset(2%    54%   35.3% 2%);  }
}

.inline-label {
  font-family: var(--font-display);
  font-size: var(--text-base);
  color: var(--text-secondary);
  animation: labelPulse 8s ease-in-out infinite;
}
@keyframes labelPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.8; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; }
}

</style>
</head>
<body>

<span class="page-title">Glimpsing... — Ambient Drift Scan</span>

<!-- ═══ STANDALONE ═══ -->
<span class="section-label">Standalone — large</span>
<div class="scan-demo" id="demo1">
  <div class="scan-stage">
    <svg class="scan-ghost" viewBox="60 140 420 280" width="100" height="67" aria-hidden="true">
      <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
      <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
    </svg>
    <svg class="scan-reveal" viewBox="60 140 420 280" width="100" height="67" aria-hidden="true">
      <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
      <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
    </svg>
    <div class="scan-frame"></div>
  </div>
  <span class="scan-label">Glimpsing...</span>
</div>
<button class="play-btn" onclick="replay('demo1','scanning')">Play</button>
<span class="option-desc">Frame drifts across the eye with varying speed and size — like a wandering gaze. Revealed region glows softly at 45% intensity. 8s ambient loop.</span>

<!-- ═══ INLINE — chat thinking state ═══ -->
<span class="section-label">Inline — chat thinking state</span>
<div class="inline-demo" id="demo2" role="status" aria-label="Glimpsing, processing your request">
  <div class="scan-stage-sm">
    <svg class="scan-ghost-sm" viewBox="60 140 420 280" width="40" height="27" aria-hidden="true">
      <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
      <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
    </svg>
    <svg class="scan-reveal-sm" viewBox="60 140 420 280" width="40" height="27" aria-hidden="true">
      <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
      <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
    </svg>
    <div class="scan-frame-sm"></div>
  </div>
  <span class="inline-label">Glimpsing...</span>
</div>
<button class="play-btn" onclick="replay('demo2','scanning')">Play</button>

<script>
function replay(id, cls) {
  const el = document.getElementById(id);
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
}
window.addEventListener('load', () => {
  setTimeout(() => {
    replay('demo1', 'scanning');
    replay('demo2', 'scanning');
  }, 300);
});
</script>

</body>
</html>
