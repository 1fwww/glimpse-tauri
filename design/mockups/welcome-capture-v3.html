<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glimpse — Tray Intro v4: In-place Reveal</title>
<link rel="stylesheet" href="tokens.css">
<style>

body {
  background: var(--surface-base);
  padding: var(--space-10);
  display: flex;
  flex-direction: column;
  gap: var(--space-10);
  align-items: center;
}

.page-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-secondary); max-width: 600px; width: 100%; }
.option-desc { font-family: var(--font-display); font-size: var(--text-xs); color: var(--text-dim); text-align: center; max-width: 400px; line-height: 1.6; }
.section-label { font-family: var(--font-display); font-size: var(--text-xs); font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; width: 100%; }

.play-btn {
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 500;
  background: var(--brand-dim);
  border: 1px solid var(--brand-border);
  color: var(--text-primary);
  cursor: pointer;
  transition: background 0.15s;
}
.play-btn:hover { background: var(--brand-muted); }

/* ═══ Stage ═══ */

.stage {
  position: relative;
  width: 340px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/*
  Eye rendered at 120x80px
  viewBox: 60 140 420 280

  Crop region in eye coordinates: x=230, y=180, w=220, h=220
  In pixels: left=49px from eye left, top=11px from eye top, 63x63px

  Eye is centered in stage (340x160), so eye left edge = (340-120)/2 = 110
  Eye top edge = (160-80)/2 = 40

  Crop frame absolute position:
  left: 110 + 49 = 159
  top: 40 + 11 = 51
  width: 63, height: 63
*/

.eye-container {
  position: relative;
  width: 120px;
  height: 80px;
  opacity: 0;
}

/* Crop frame — pixel-perfect positioned over the eye */
.crop-frame {
  position: absolute;
  top: 11px;
  left: 49px;
  width: 63px;
  height: 63px;
  border: 1.5px solid rgba(108, 99, 255, 0);
  border-radius: 5px;
  z-index: 5;
  pointer-events: none;
}

/* Dim overlay — covers the eye EXCEPT the crop area */
/* Using clip-path to cut a hole */
.dim-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 120px;
  height: 80px;
  background: rgba(242, 242, 244, 0.88); /* semi-transparent surface-base */
  z-index: 3;
  opacity: 0;
  /* Clip path: full rect minus the crop hole */
  clip-path: polygon(
    0% 0%, 100% 0%, 100% 100%, 0% 100%,   /* outer rect */
    0% 0%,                                    /* back to top-left */
    0% 14%,                                   /* down to crop top: 11/80 = 14% */
    40.8% 14%,                                /* right to crop left: 49/120 = 40.8% */
    40.8% 92.5%,                              /* down to crop bottom: (11+63)/80 = 92.5% */
    93.3% 92.5%,                              /* right to crop right: (49+63)/120 = 93.3% */
    93.3% 14%,                                /* up to crop top */
    0% 14%                                    /* back to left */
  );
}

/* Hint text below */
.hint {
  position: absolute;
  bottom: var(--space-2);
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-display);
  font-size: var(--text-sm);
  color: var(--text-dim);
  white-space: nowrap;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.hint-icon {
  width: 16px;
  height: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--brand-dim);
  border-radius: 3px;
  flex-shrink: 0;
}

/* ═══ Full Demo Animation ═══

  0.0-0.4s   Eye fades in (scale 0.95→1)
  0.7-1.0s   Crop frame expands from top-left
  1.4s       Snap: dim + color change
  1.9s       Hint fades in

═══ */

.playing .eye-container {
  animation: eyeIn 0.4s ease-out forwards;
}
@keyframes eyeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Crop frame expands from a point — like dragging a selection */
.playing .crop-frame {
  animation: cropExpand 0.3s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
}
@keyframes cropExpand {
  0% {
    border-color: rgba(108, 99, 255, 0.5);
    top: 11px;
    left: 49px;
    width: 0px;
    height: 0px;
    opacity: 1;
  }
  100% {
    border-color: rgba(108, 99, 255, 0.5);
    top: 11px;
    left: 49px;
    width: 63px;
    height: 63px;
    opacity: 1;
  }
}

/* Snap! — dim + color change happen fast together */
.playing .dim-overlay {
  animation: dimIn 0.1s ease-out 1.4s forwards;
}
@keyframes dimIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.playing .white-overlay {
  animation: whiteIn 0.1s ease-out 1.4s forwards;
}
@keyframes whiteIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.playing .hint {
  animation: hintIn 0.4s ease-out 1.9s forwards;
}
@keyframes hintIn {
  from { opacity: 0; transform: translateX(-50%) translateY(4px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ═══ Welcome context ═══ */

.welcome-sim {
  width: 380px;
  border-radius: var(--radius-xl);
  background: var(--surface-base);
  border: 1px solid rgba(108, 99, 255, 0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-5) var(--space-8) var(--space-6);
  gap: var(--space-3);
}
.w-title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 600; color: var(--text-primary); }
.w-desc { font-family: var(--font-display); font-size: var(--text-base); color: var(--text-secondary); text-align: center; }
.w-btn {
  width: 100%; max-width: 260px; padding: var(--space-3) var(--space-5); border-radius: var(--radius-md);
  background: var(--brand); color: #fff; font-family: var(--font-display);
  font-size: var(--text-md); font-weight: 500; text-align: center;
  box-shadow: 0 2px 8px rgba(108,99,255,0.25); margin-top: var(--space-2);
}

/* Welcome stage — smaller eye (100x67) */
/*
  Eye 100x67: crop at (40,10) size 52x52
*/
.w-stage {
  position: relative;
  width: 280px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 4px 0;
}

.w-eye-container {
  position: relative;
  width: 100px;
  height: 67px;
  opacity: 0;
  will-change: opacity;
}

/* Cursor dot — lands before frame expands */
.w-cursor-dot {
  position: absolute;
  top: -5px;
  left: -5px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(108, 99, 255, 0.7);
  z-index: 6;
  opacity: 0;
}

/* Frame covers ENTIRE eye with 5px margin */
.w-crop-frame {
  position: absolute;
  top: -5px;
  left: -5px;
  width: 0px;
  height: 0px;
  border: 1.5px solid rgba(108, 99, 255, 0.8);
  border-radius: 4px;
  z-index: 5;
  will-change: width, height, opacity;
}


/* ═══ Welcome Animation ═══

  0.0-0.3s   Ghost eye fades in (35% opacity)
  0.35-0.5s  Cursor dot appears (8px, 0.35s pause)
  0.7-1.5s   Dot fades, frame expands + progressive color reveal (human drag with mid-pause)
  1.4-1.55s  Ghost fades out (masked by full-color overlay)
  1.85s      Frame snap (flash → fade, 0.4s)
  1.9s       Blink (synced with frame fade)
  2.3-2.6s   Text appears: title → tagline → button

═══ */

.playing-w .w-eye-container {
  animation: containerIn 0.01s ease-out forwards;
}
@keyframes containerIn {
  to { opacity: 1; }
}

/* Cursor dot — appears, pauses, then fades as frame starts */
.playing-w .w-cursor-dot {
  animation: wDotIn 0.15s ease-out 0.35s forwards, wDotOut 0.1s ease-out 0.7s forwards;
}
@keyframes wDotIn {
  from { opacity: 0; transform: scale(0.3); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes wDotOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Ghost SVG — faint purple, hides when progressive reveal completes */
.playing-w .w-eye-container > svg {
  animation: ghostIn 0.3s ease-out forwards, ghostHide 0.15s ease-out 1.4s forwards;
}
@keyframes ghostHide {
  from { opacity: 0.35; }
  to { opacity: 0; }
}
@keyframes ghostIn {
  from { opacity: 0; }
  to { opacity: 0.35; }
}

/* Frame expands from top-left — human drag feel with mid-pause */
.playing-w .w-crop-frame {
  animation:
    wCropExpand 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.7s forwards,
    wFrameSnap 0.4s ease-out 1.85s forwards;
}
@keyframes wCropExpand {
  0% {
    top: -5px; left: -5px;
    width: 8px; height: 8px; opacity: 1;
  }
  40% {
    top: -5px; left: -5px;
    width: 55px; height: 38px; opacity: 1;
  }
  55% {
    top: -5px; left: -5px;
    width: 60px; height: 42px; opacity: 1;
  }
  100% {
    top: -5px; left: -5px;
    width: 110px; height: 77px; opacity: 1;
  }
}
@keyframes wFrameSnap {
  0% { border-color: rgba(108, 99, 255, 0.8); box-shadow: none; opacity: 1; }
  10% { border-color: rgba(108, 99, 255, 1); box-shadow: 0 0 14px rgba(108, 99, 255, 0.25); opacity: 1; }
  100% { border-color: rgba(108, 99, 255, 0.6); box-shadow: none; opacity: 0; }
}

/* Progressive reveal — full-color overlay clips in sync with frame expansion
   Frame at (-5,-5) expands to 110x77 over 100x67 eye.
   At 40%: 55x38 → eye covered: 50x33 → inset right=50%, bottom=50.7%
   At 55%: 60x42 → eye covered: 55x37 → inset right=45%, bottom=44.8%  */
.w-white-overlay {
  clip-path: inset(0 100% 100% 0);
  will-change: clip-path;
}
.playing-w .w-white-overlay {
  animation: wRevealExpand 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.7s forwards;
}
@keyframes wRevealExpand {
  0%   { opacity: 1; clip-path: inset(0 97% 95.5% 0); }
  40%  { opacity: 1; clip-path: inset(0 50% 50.7% 0); }
  55%  { opacity: 1; clip-path: inset(0 45% 44.8% 0); }
  100% { opacity: 1; clip-path: inset(0 0% 0% 0); }
}

/* Blink synced with frame fade */
.playing-w .w-white-overlay svg path:first-child {
  transform-origin: 260px 212px;
  animation: wBlink 0.5s cubic-bezier(0.22, 1, 0.36, 1) 1.9s;
}
@keyframes wBlink {
  0% { transform: translateY(0); }
  30% { transform: translateY(24px); }
  35% { transform: translateY(24px); }
  100% { transform: translateY(0); }
}

/* Text + button fade in after blink */
@keyframes wFadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.playing-w .w-title { animation: wFadeUp 0.35s ease-out 2.3s forwards; }
.playing-w .w-desc { animation: wFadeUp 0.35s ease-out 2.45s forwards; }
.playing-w .w-btn { animation: wFadeUp 0.35s ease-out 2.6s forwards; }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; }
}

</style>
</head>
<body>

<span class="page-title">Welcome Capture v3 — Full eye version</span>

<!-- ═══ FULL DEMO ═══ -->
<span class="section-label">Full demo</span>
<div class="stage" id="main">
  <div class="eye-container">
    <svg viewBox="60 140 420 280" width="120" height="80" aria-hidden="true">
      <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
      <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
    </svg>
    <div class="crop-frame"></div>
    <div class="dim-overlay"></div>
    <!-- White version of the eye, clipped to crop area, fades in last -->
    <div class="white-overlay" style="position:absolute; top:11px; left:49px; width:63px; height:63px; opacity:0; z-index:4; overflow:hidden; border-radius:5px;">
      <svg viewBox="230 180 220 220" width="63" height="63" aria-hidden="true">
        <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round"/>
        <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="#1a1a1a" stroke-width="24" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="hint">
    <span>Find</span>
    <span class="hint-icon">
      <svg viewBox="230 180 220 220" width="12" height="9" aria-hidden="true"><path d="M98 212C152 174 365 158 420 248" fill="none" stroke="currentColor" stroke-width="26" stroke-linecap="round"/><path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="currentColor" stroke-width="28" stroke-linecap="round"/></svg>
    </span>
    <span>in your menu bar</span>
  </div>
</div>
<button class="play-btn" onclick="replay('main','playing')">Play</button>
<span class="option-desc">Eye appears → frame highlights the crop region → everything outside dims → the remaining shape IS the tray icon. No movement, just reveal.</span>

<!-- ═══ WELCOME — Step 0 ═══ -->
<span class="section-label">Welcome Step 0 — Capture reveal</span>
<div class="welcome-sim">
  <span class="w-title" style="opacity:0;">Glimpse</span>
  <span class="w-desc" style="opacity:0;">Glimpse your screen. Stay in flow.</span>

  <div class="w-stage" id="welc">
    <!-- Eye + crop animation -->
    <div class="w-eye-container">
      <svg viewBox="60 140 420 280" width="100" height="67" aria-hidden="true">
        <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
        <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
      </svg>
      <div class="w-cursor-dot"></div>
      <div class="w-crop-frame"></div>
      <!-- Full color eye — progressive reveal synced with frame -->
      <div class="w-white-overlay" style="position:absolute; top:0; left:0; width:100px; height:67px; opacity:1; z-index:4;">
        <svg viewBox="60 140 420 280" width="100" height="67" aria-hidden="true">
          <path d="M98 212C152 174 365 158 420 248" fill="none" stroke="var(--brand)" stroke-width="20" stroke-linecap="round"/>
          <path d="M262 374C228 373 176 360 128 321C176 276 314 200 390 270C462 336 350 379 322 374C248 361 262 276 322 279C378 282 363 346 322 332" fill="none" stroke="var(--brand)" stroke-width="22" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>

  <button class="w-btn" style="opacity:0;">Get Started</button>
</div>
<button class="play-btn" onclick="replay('welc','playing-w')">Play in context</button>

<script>
function replay(id, cls) {
  const el = document.getElementById(id);
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
}
window.addEventListener('load', () => {
  setTimeout(() => replay('main', 'playing'), 500);
  setTimeout(() => replay('welc', 'playing-w'), 500);
});
</script>

</body>
</html>
