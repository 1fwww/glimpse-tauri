<style>

body {
  background: var(--surface-base);
  padding: var(--space-10);
  display: flex;
  flex-direction: column;
  gap: 48px;
  align-items: center;
}

.page-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-secondary); max-width: 600px; width: 100%; }
.section-label { font-family: var(--font-display); font-size: var(--text-xs); font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; width: 100%; }

.row { display: flex; gap: 48px; align-items: flex-start; }
.variant { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.label { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 500; color: var(--text-primary); }
.sublabel { font-family: var(--font-display); font-size: 10px; color: var(--text-dim); text-align: center; max-width: 140px; line-height: 1.5; }

.preview {
  width: 160px; height: 160px;
  background: #fff;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: center;
}

.mb { display:flex; align-items:center; gap:14px; padding:4px 16px; height:28px; border-radius:6px; }
.mb-l { background:#F6F6F9; border:1px solid rgba(0,0,0,0.06); }
.mb-d { background:#2C2C2E; border:1px solid rgba(255,255,255,0.06); }
.mb-dot { width:3px; height:3px; border-radius:50%; }
.mb-dot-l { background:rgba(0,0,0,0.15); }
.mb-dot-d { background:rgba(255,255,255,0.15); }
.mb-time { font-family:var(--font-display); font-size:11px; }
.mb-time-l { color:rgba(0,0,0,0.5); }
.mb-time-d { color:rgba(255,255,255,0.5); }

</style>
</head>

<!--
